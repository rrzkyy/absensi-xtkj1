<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Utama - Absensi Sekolah</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 20px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(255, 77, 77, 0.2);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .profile-info h2 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .profile-info p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .section h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .day-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .day-tab {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
        }

        .day-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-table th,
        .schedule-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .schedule-table th {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
        }

        .schedule-table tr:last-child td {
            border-bottom: none;
        }

        .uniform-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            font-size: 13px;
            color: #a5b4fc;
        }

        .absen-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .absen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-hadir {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-belum {
            background: rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🖇️ Absensi Sekolah</h1>
        <a href="login.html" class="logout-btn">Keluar</a>
    </div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-photo" id="profilePhoto">👤</div>
            <div class="profile-info">
                <h2 id="studentName">Nama Siswa</h2>
                <p id="studentClass">Kelas</p>
                <p id="studentNis">NIS</p>
            </div>
        </div>

        <div class="section">
            <h3>📅 Jadwal Pelajaran</h3>
            <div class="day-tabs" id="dayTabs"></div>
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>Jam</th>
                        <th>Mata Pelajaran</th>
                        <th>Baju</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody"></tbody>
            </table>
        </div>

        <div class="section">
            <h3>📋 Status Absensi Hari Ini</h3>
            <p id="attendanceStatus">Memuat...</p>
        </div>

        <button class="absen-btn" onclick="window.location.href='absensi.html'">📷 Absen Sekarang</button>
    </div>

    <script>
        const days = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];
        let currentDay = days[new Date().getDay() - 1] || 'Senin';

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'student') {
            window.location.href = 'login.html';
        }

        document.getElementById('studentName').textContent = user.student.name;
        document.getElementById('studentClass').textContent = user.student.class;
        document.getElementById('studentNis').textContent = 'NIS: ' + user.student.nis;
        document.getElementById('profilePhoto').textContent = user.student.name.charAt(0);

        // Render day tabs
        const dayTabsEl = document.getElementById('dayTabs');
        days.forEach(day => {
            const btn = document.createElement('button');
            btn.className = `day-tab ${day === currentDay ? 'active' : ''}`;
            btn.textContent = day;
            btn.onclick = () => loadSchedule(day);
            dayTabsEl.appendChild(btn);
        });

        async function loadSchedule(day) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === day);
            });

            const res = await fetch(`/api/schedule/${day}`);
            const schedules = await res.json();

            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = schedules.map(s => `
        <tr>
          <td>${s.time}</td>
          <td>${s.subject}</td>
          <td><span class="uniform-badge">${s.uniform}</span></td>
        </tr>
      `).join('');
        }

        // Check today's attendance
        async function checkAttendance() {
            const res = await fetch('/api/attendance/today');
            const attendance = await res.json();
            const today = new Date().toISOString().split('T')[0];
            const myAttendance = attendance.find(a => a.student_id === user.student.id && a.date === today);

            const statusEl = document.getElementById('attendanceStatus');
            if (myAttendance) {
                statusEl.innerHTML = `<span class="status-badge status-hadir">✓ Sudah Absen</span> - Jam: ${myAttendance.time_in}`;
            } else {
                statusEl.innerHTML = `<span class="status-badge status-belum">✗ Belum Absen</span>`;
            }
        }

        loadSchedule(currentDay);
        checkAttendance();
    </script>
</body>

</html>
